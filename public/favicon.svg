<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Isometric 3x3 Rubik's Cube favicon
    Vertices (all verified with isometric math):
      TV=(50,8)  RV=(87,28)  LV=(13,28)
      FV=(50,48) BR=(87,70)  BL=(13,70)  BV=(50,90)
    Grid step_right=(12.33,6.67)  step_left=(-12.33,6.67)  step_down=(0,14)
  -->

  <!-- ═══ LEFT FACE (Orange) ════════════════════════════════════ -->
  <!-- Row 0 -->
  <polygon points="13,28 25.3,34.7 25.3,48.7 13,42"       fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="25.3,34.7 37.7,41.3 37.7,55.3 25.3,48.7" fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="37.7,41.3 50,48 50,62 37.7,55.3"         fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 1 -->
  <polygon points="13,42 25.3,48.7 25.3,62.7 13,56"       fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="25.3,48.7 37.7,55.3 37.7,69.3 25.3,62.7" fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="37.7,55.3 50,62 50,76 37.7,69.3"         fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 2 -->
  <polygon points="13,56 25.3,62.7 25.3,76.7 13,70"       fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="25.3,62.7 37.7,69.3 37.7,83.3 25.3,76.7" fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="37.7,69.3 50,76 50,90 37.7,83.3"         fill="#F57C00" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- ═══ RIGHT FACE (Blue) ═════════════════════════════════════ -->
  <!-- Row 0 -->
  <polygon points="50,48 62.3,41.3 62.3,55.3 50,62"       fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="62.3,41.3 74.7,34.7 74.7,48.7 62.3,55.3" fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="74.7,34.7 87,28 87,42 74.7,48.7"         fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 1 -->
  <polygon points="50,62 62.3,55.3 62.3,69.3 50,76"       fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="62.3,55.3 74.7,48.7 74.7,62.7 62.3,69.3" fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="74.7,48.7 87,42 87,56 74.7,62.7"         fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 2 -->
  <polygon points="50,76 62.3,69.3 62.3,83.3 50,90"       fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="62.3,69.3 74.7,62.7 74.7,76.7 62.3,83.3" fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="74.7,62.7 87,56 87,70 74.7,76.7"         fill="#1565C0" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- ═══ TOP FACE (Yellow) ══════════════════════════════════════ -->
  <!-- P[c][r] = (50,8) + c*(12.33,6.67) + r*(-12.33,6.67) -->
  <!-- Row 0 (nearest to TV) -->
  <polygon points="50,8    62.3,14.7 50,21.3  37.7,14.7" fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="62.3,14.7 74.7,21.3 62.3,28   50,21.3"  fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="74.7,21.3 87,28   74.7,34.7 62.3,28"   fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 1 -->
  <polygon points="37.7,14.7 50,21.3  37.7,28   25.3,21.3" fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="50,21.3  62.3,28   50,34.7  37.7,28"   fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="62.3,28   74.7,34.7 62.3,41.3 50,34.7"  fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Row 2 (nearest to FV) -->
  <polygon points="25.3,21.3 37.7,28   25.3,34.7 13,28"   fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="37.7,28   50,34.7  37.7,41.3 25.3,34.7" fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>
  <polygon points="50,34.7  62.3,41.3 50,48   37.7,41.3"  fill="#FDD835" stroke="#111" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Thick outer silhouette for crispness at small sizes -->
  <polygon points="50,8 87,28 87,70 50,90 13,70 13,28"
           fill="none" stroke="#111" stroke-width="2.5" stroke-linejoin="round"/>
  <polyline points="50,8 50,48 13,28"  fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
  <polyline points="50,48 87,28"       fill="none" stroke="#111" stroke-width="2"/>
  <polyline points="50,48 50,90"       fill="none" stroke="#111" stroke-width="2"/>
</svg>
